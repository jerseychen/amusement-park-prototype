<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游乐场管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background: #f5f7fa; }
        .sidebar { width: 260px; background: #001529; min-height: 100vh; position: fixed; left: 0; top: 0; z-index: 100; }
        .logo { padding: 16px; text-align: center; color: white; font-size: 16px; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .store-tree { padding: 12px; color: rgba(255,255,255,0.85); }
        .tree-item { padding: 8px 12px; cursor: pointer; border-radius: 4px; margin-bottom: 4px; }
        .tree-item:hover, .tree-item.active { background: #1890ff; color: white; }
        .tree-item i { margin-right: 8px; }
        .tree-children { padding-left: 24px; }
        .tree-child { padding: 6px 12px; cursor: pointer; border-radius: 4px; font-size: 13px; color: rgba(255,255,255,0.65); }
        .tree-child:hover, .tree-child.active { color: white; background: rgba(24,144,255,0.3); }
        .main-content { margin-left: 260px; min-height: 100vh; }
        .header { background: white; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 1px 4px rgba(0,0,0,0.08); position: sticky; top: 0; z-index: 99; }
        .date-btn { padding: 6px 16px; border: 1px solid #d9d9d9; background: white; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .date-btn.active { background: #1890ff; color: white; border-color: #1890ff; }
        .content { padding: 20px 24px; }
        .metrics-row { display: grid; grid-template-columns: repeat(8, 1fr); gap: 12px; margin-bottom: 20px; }
        .metric-card { background: white; padding: 16px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .metric-label { font-size: 12px; color: #666; margin-bottom: 8px; }
        .metric-value { font-size: 20px; font-weight: bold; color: #333; }
        .metric-compare { font-size: 11px; margin-top: 4px; }
        .metric-compare.up { color: #52c41a; }
        .module { background: white; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .module-header { padding: 16px 20px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; gap: 8px; }
        .module-title { font-size: 16px; font-weight: 600; color: #333; }
        .module-icon { width: 4px; height: 16px; background: #1890ff; border-radius: 2px; }
        .module-body { padding: 20px; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .data-table th { background: #fafafa; padding: 12px; text-align: left; font-weight: 500; color: #666; border-bottom: 1px solid #f0f0f0; }
        .data-table td { padding: 12px; border-bottom: 1px solid #f0f0f0; }
        .data-table .num { text-align: right; font-family: monospace; }
        .data-table .highlight { color: #1890ff; font-weight: 500; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">游乐场管理系统</div>
        <div class="store-tree">
            <div style="font-size: 12px; color: rgba(255,255,255,0.45); margin-bottom: 12px;">选择门店</div>
            <div class="tree-item active"><i class="fas fa-building"></i>全部门店</div>
            <div class="tree-item"><i class="fas fa-chevron-right"></i>华南区域</div>
            <div class="tree-children">
                <div class="tree-child">广州店</div>
                <div class="tree-child">深圳店</div>
                <div class="tree-child">珠海店</div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <div style="display: flex; gap: 8px;">
                <button class="date-btn active">今日</button>
                <button class="date-btn">昨日</button>
                <button class="date-btn">本周</button>
                <button class="date-btn">本月</button>
            </div>
            <div style="display: flex; align-items: center; gap: 8px;">
                <span style="color: #666; font-size: 14px;">对比：</span>
                <select style="padding: 6px 12px; border: 1px solid #d9d9d9; border-radius: 4px;">
                    <option>去年同期</option>
                    <option>上月同期</option>
                </select>
            </div>
        </div>

        <div class="content">
            <div class="metrics-row">
                <div class="metric-card">
                    <div class="metric-label">营业额</div>
                    <div class="metric-value" style="color: #1890ff;">8,888</div>
                    <div class="metric-compare up">+10% vs 对比期</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">会员客单价</div>
                    <div class="metric-value">88</div>
                    <div class="metric-compare up">+10%</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">售币数</div>
                    <div class="metric-value">88</div>
                    <div class="metric-compare up">+10%</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">耗币数</div>
                    <div class="metric-value">88</div>
                    <div class="metric-compare up">+10%</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">新增会员</div>
                    <div class="metric-value">88</div>
                    <div class="metric-compare up">+10%</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">到店会员</div>
                    <div class="metric-value">88</div>
                    <div class="metric-compare up">+10%</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">复购会员</div>
                    <div class="metric-value">88</div>
                    <div class="metric-compare up">+10%</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">免费币</div>
                    <div class="metric-value" style="color: #722ed1;">5,450</div>
                    <div class="metric-compare up">18.5%占比</div>
                </div>
            </div>

            <div class="module">
                <div class="module-header"><div class="module-icon"></div><div class="module-title">营收趋势</div></div>
                <div class="module-body"><canvas id="revenueChart" height="100"></canvas></div>
            </div>

            <div class="module">
                <div class="module-header"><div class="module-icon"></div><div class="module-title">营业额分析</div></div>
                <div class="module-body">
                    <table class="data-table">
                        <thead><tr><th>渠道</th><th class="num">金额</th><th>占比</th></tr></thead>
                        <tbody>
                            <tr><td>门店</td><td class="num highlight">150,000</td><td>30%</td></tr>
                            <tr><td>微信小程序</td><td class="num highlight">100,000</td><td>20%</td></tr>
                            <tr><td>美团/大众点评</td><td class="num highlight">100,000</td><td>20%</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        new Chart(document.getElementById('revenueChart'), {
            type: 'line',
            data: {
                labels: ['00', '04', '08', '12', '16', '20'],
                datasets: [{
                    label: '今日营收',
                    data: [1200, 800, 3500, 5800, 7200, 8888],
                    borderColor: '#1890ff',
                    tension: 0.4
                }, {
                    label: '对比期',
                    data: [1000, 900, 3200, 5200, 6500, 7500],
                    borderColor: '#999',
                    borderDash: [5, 5],
                    tension: 0.4
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    </script>
</body>
</html>
