<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游乐场管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background: #f0f2f5; }
        .sidebar { width: 220px; background: #001529; min-height: 100vh; position: fixed; left: 0; top: 0; z-index: 100; }
        .logo { padding: 16px; text-align: center; color: white; font-size: 16px; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .menu-item { padding: 0 16px; height: 40px; display: flex; align-items: center; color: rgba(255,255,255,0.65); cursor: pointer; font-size: 14px; }
        .menu-item:hover, .menu-item.active { color: #fff; background: #1890ff; }
        .menu-item i { width: 20px; margin-right: 10px; }
        .menu-arrow { margin-left: auto; font-size: 10px; }
        .submenu { background: #000c17; display: none; }
        .submenu.open { display: block; }
        .submenu-item { padding: 0 16px 0 46px; height: 36px; display: flex; align-items: center; color: rgba(255,255,255,0.65); cursor: pointer; font-size: 13px; }
        .submenu-item:hover { color: #fff; background: rgba(24,144,255,0.3); }
        .main-content { margin-left: 220px; min-height: 100vh; }
        .header { background: white; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 1px 4px rgba(0,0,0,0.08); position: sticky; top: 0; z-index: 99; }
        .date-tab { padding: 6px 16px; border: 1px solid #d9d9d9; background: white; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .date-tab.active { background: #1890ff; color: white; border-color: #1890ff; }
        .content { padding: 20px; }
        .page { display: none; }
        .page.active { display: block; }
        .metric-card { background: white; padding: 16px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .metric-label { font-size: 12px; color: #666; margin-bottom: 8px; }
        .metric-value { font-size: 20px; font-weight: bold; }
        .module { background: white; border-radius: 8px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .module-header { padding: 16px 20px; border-bottom: 1px solid #f0f0f0; }
        .module-title { font-size: 15px; font-weight: 600; }
        .module-body { padding: 20px; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .data-table th { background: #fafafa; padding: 12px; text-align: left; font-weight: 500; color: #666; border-bottom: 1px solid #f0f0f0; }
        .data-table td { padding: 12px; border-bottom: 1px solid #f0f0f0; }
        .data-table .num { text-align: right; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">游乐场管理系统</div>
        <div class="menu-item active" onclick="showPage('dashboard')"><i class="fas fa-home"></i>首页报表</div>
        <div class="menu-item" onclick="toggleMenu('business-menu', this)"><i class="fas fa-chart-line"></i>营业<i class="fas fa-chevron-right menu-arrow"></i></div>
        <div class="submenu" id="business-menu">
            <div class="submenu-item">门店结账</div>
            <div class="submenu-item">交接班</div>
            <div class="submenu-item">营业报表</div>
            <div class="submenu-item">支付对账</div>
        </div>
        <div class="menu-item" onclick="toggleMenu('package-menu', this)"><i class="fas fa-gift"></i>套餐<i class="fas fa-chevron-right menu-arrow"></i></div>
        <div class="submenu" id="package-menu">
            <div class="submenu-item">套餐管理</div>
        </div>
        <div class="menu-item" onclick="toggleMenu('product-menu', this)"><i class="fas fa-shopping-bag"></i>商品<i class="fas fa-chevron-right menu-arrow"></i></div>
        <div class="submenu" id="product-menu">
            <div class="submenu-item">商品列表</div>
        </div>
        <div class="menu-item" onclick="toggleMenu('member-menu', this)"><i class="fas fa-user"></i>会员<i class="fas fa-chevron-right menu-arrow"></i></div>
        <div class="submenu" id="member-menu">
            <div class="submenu-item">会员档案</div>
        </div>
        <div class="menu-item"><i class="fas fa-cog"></i>设置</div>
    </div>

    <div class="main-content">
        <div class="header">
            <div style="display: flex; gap: 8px;">
                <button class="date-tab active">今日</button>
                <button class="date-tab">昨日</button>
                <button class="date-tab">本周</button>
            </div>
            <div style="display: flex; align-items: center; gap: 16px;">
                <span style="color: #666; font-size: 14px;">对比：</span>
                <select style="padding: 6px 12px; border: 1px solid #d9d9d9; border-radius: 4px;">
                    <option>去年同期</option>
                    <option>上月同期</option>
                </select>
            </div>
        </div>

        <div class="content">
            <div class="page active" id="page-dashboard">
                <div style="display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 16px;">
                    <div class="metric-card"><div class="metric-label">今日营业额</div><div class="metric-value" style="color: #1890ff;">¥12,580</div></div>
                    <div class="metric-card"><div class="metric-label">今日客流量</div><div class="metric-value" style="color: #52c41a;">358人</div></div>
                    <div class="metric-card"><div class="metric-label">会员客单价</div><div class="metric-value" style="color: #fa8c16;">¥68.5</div></div>
                    <div class="metric-card"><div class="metric-label">散客客单价</div><div class="metric-value" style="color: #13c2c2;">¥45.2</div></div>
                    <div class="metric-card"><div class="metric-label">售币单价</div><div class="metric-value" style="color: #722ed1;">¥0.85</div></div>
                    <div class="metric-card"><div class="metric-label">售币数</div><div class="metric-value" style="color: #eb2f96;">15,680币</div></div>
                </div>

                <div class="module">
                    <div class="module-header"><div class="module-title">营收趋势</div></div>
                    <div class="module-body"><canvas id="revenueChart" height="100"></canvas></div>
                </div>

                <div class="module">
                    <div class="module-header"><div class="module-title">渠道占比</div></div>
                    <div class="module-body">
                        <table class="data-table">
                            <thead><tr><th>渠道</th><th class="num">金额</th><th class="num">占比</th></tr></thead>
                            <tbody>
                                <tr><td>线下门店</td><td class="num">¥8,526</td><td class="num">45%</td></tr>
                                <tr><td>微信小程序</td><td class="num">¥3,794</td><td class="num">20%</td></tr>
                                <tr><td>美团/大众点评</td><td class="num">¥2,846</td><td class="num">15%</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="page" id="page-ticket-sell">
                <div class="module"><div class="module-header"><div class="module-title">快速售票</div></div><div class="module-body"><p>售票页面...</p></div></div>
            </div>
        </div>
    </div>

    <script>
        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + page).classList.add('active');
        }
        function toggleMenu(id, el) {
            document.getElementById(id).classList.toggle('open');
            el.querySelector('.menu-arrow').style.transform = document.getElementById(id).classList.contains('open') ? 'rotate(90deg)' : '';
        }
        new Chart(document.getElementById('revenueChart'), {
            type: 'line',
            data: {
                labels: ['00', '04', '08', '12', '16', '20'],
                datasets: [{
                    label: '今日',
                    data: [800, 600, 2500, 5800, 9200, 12580],
                    borderColor: '#1890ff',
                    tension: 0.4
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    </script>
</body>
</html>
